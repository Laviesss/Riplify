<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riplify - Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-[#0f0f0f] text-white flex flex-col h-screen overflow-hidden">
    <!-- Top Bar -->
    <div class="h-16 bg-[#1a1a1a] flex items-center justify-between px-6 border-b border-[#282828] z-20">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-[#7B2FBE] rounded-full flex items-center justify-center text-white font-bold text-xl shadow-lg">R</div>
            <h1 class="text-xl font-bold tracking-tight">Settings</h1>
        </div>
        <a href="/" class="text-sm font-bold text-gray-400 hover:text-white hover:scale-105 transition-all">&larr; Back to Library</a>
    </div>

    <div class="flex-1 overflow-y-auto p-12 custom-scrollbar bg-[#121212]">
        <div class="max-w-3xl mx-auto space-y-8 fade-in">
            <!-- Download Section -->
            <section class="settings-card">
                <div class="flex items-center mb-6">
                    <div class="w-10 h-10 bg-[#7B2FBE]/10 rounded-full flex items-center justify-center mr-4">
                        <svg class="w-5 h-5 text-[#7B2FBE]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold tracking-tight">Download Configuration</h3>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Output Folder</label>
                        <input type="text" id="output_folder" value="{{ config.output_folder }}" class="w-full bg-[#2a2a2a] border border-transparent rounded-md px-4 py-3 text-sm focus:ring-2 focus:ring-white focus:outline-none transition-all hover:bg-[#333]">
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Audio Format</label>
                            <select id="audio_format" class="w-full bg-[#2a2a2a] border-none rounded-md px-4 py-3 text-sm focus:ring-2 focus:ring-white focus:outline-none transition-all hover:bg-[#333]">
                                <option value="mp3" {% if config.audio_format == 'mp3' %}selected{% endif %}>MP3 (Standard)</option>
                                <option value="flac" {% if config.audio_format == 'flac' %}selected{% endif %}>FLAC (Lossless)</option>
                                <option value="m4a" {% if config.audio_format == 'm4a' %}selected{% endif %}>M4A (High Quality)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Audio Quality</label>
                            <select id="audio_quality" class="w-full bg-[#2a2a2a] border-none rounded-md px-4 py-3 text-sm focus:ring-2 focus:ring-white focus:outline-none transition-all hover:bg-[#333]">
                                <option value="128kbps" {% if config.audio_quality == '128kbps' %}selected{% endif %}>128 kbps (Light)</option>
                                <option value="192kbps" {% if config.audio_quality == '192kbps' %}selected{% endif %}>192 kbps (Medium)</option>
                                <option value="256kbps" {% if config.audio_quality == '256kbps' %}selected{% endif %}>256 kbps (High)</option>
                                <option value="320kbps" {% if config.audio_quality == '320kbps' %}selected{% endif %}>320 kbps (Extreme)</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">FFmpeg Path</label>
                        <input type="text" id="ffmpeg_path" value="{{ config.ffmpeg_path }}" class="w-full bg-[#2a2a2a] border-none rounded-md px-4 py-3 text-sm focus:ring-2 focus:ring-white focus:outline-none transition-all hover:bg-[#333]">
                    </div>
                </div>
            </section>

            <section class="bg-[#1a1a1a] p-8 rounded-lg border border-gray-800 shadow-2xl">
                <h3 class="text-xl font-bold mb-6 text-[#7B2FBE] flex items-center">
                    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                    Spotify Data Export
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Spotify Export Folder</label>
                        <div class="flex space-x-2">
                            <input type="text" id="spotify_export_folder" value="{{ config.spotify_export_folder }}" placeholder="/path/to/extracted/export" class="flex-1 bg-[#2a2a2a] border border-gray-700 rounded-md px-4 py-2 focus:outline-none focus:border-[#7B2FBE]">
                        </div>
                        <p class="mt-2 text-xs text-gray-500">Extract your Spotify data export zip and select the folder here. It should contain MyData/ or Playlist1.json files.</p>
                    </div>
                </div>
            </section>

            <div class="flex justify-end pt-4 pb-12">
                <button id="saveSettingsBtn" class="bg-[#1DB954] hover:bg-[#1ed760] text-black font-extrabold py-3 px-12 rounded-full transition-all transform hover:scale-105 shadow-xl">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('toggleInstructions').addEventListener('click', () => {
            const content = document.getElementById('instructionsContent');
            const arrow = document.getElementById('instArrow');
            content.classList.toggle('hidden');
            arrow.style.transform = content.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        });

        document.getElementById('saveSettingsBtn').addEventListener('click', () => {
            const data = {
                output_folder: document.getElementById('output_folder').value,
                audio_format: document.getElementById('audio_format').value,
                audio_quality: document.getElementById('audio_quality').value,
                ffmpeg_path: document.getElementById('ffmpeg_path').value,
                spotify_export_folder: document.getElementById('spotify_export_folder').value
            };

            fetch('/api/settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(res => {
                if (res.status === 'ok') {
                    alert('Settings saved successfully!');
                }
            });
        });
    </script>
</body>
</html>
