<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riplify - Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-[#0f0f0f] text-white flex flex-col h-screen">
    <div class="h-16 bg-[#1a1a1a] flex items-center justify-between px-6 border-b border-[#7B2FBE]">
        <h1 class="text-2xl font-bold text-[#7B2FBE]">Settings</h1>
        <a href="/" class="text-gray-400 hover:text-white transition">&larr; Back to Library</a>
    </div>

    <div class="flex-1 overflow-y-auto p-12">
        <div class="max-w-2xl mx-auto space-y-8">
            <section class="bg-[#1a1a1a] p-8 rounded-lg border border-gray-800 shadow-2xl">
                <h3 class="text-xl font-bold mb-6 text-[#7B2FBE] flex items-center">
                    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Download Configuration
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Output Folder</label>
                        <input type="text" id="output_folder" value="{{ config.output_folder }}" class="w-full bg-[#2a2a2a] border border-gray-700 rounded-md px-4 py-2 focus:outline-none focus:border-[#7B2FBE]">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Audio Format</label>
                            <select id="audio_format" class="w-full bg-[#2a2a2a] border border-gray-700 rounded-md px-4 py-2 focus:outline-none focus:border-[#7B2FBE]">
                                <option value="mp3" {% if config.audio_format == 'mp3' %}selected{% endif %}>MP3</option>
                                <option value="flac" {% if config.audio_format == 'flac' %}selected{% endif %}>FLAC</option>
                                <option value="m4a" {% if config.audio_format == 'm4a' %}selected{% endif %}>M4A</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Audio Quality</label>
                            <select id="audio_quality" class="w-full bg-[#2a2a2a] border border-gray-700 rounded-md px-4 py-2 focus:outline-none focus:border-[#7B2FBE]">
                                <option value="128kbps" {% if config.audio_quality == '128kbps' %}selected{% endif %}>128 kbps</option>
                                <option value="192kbps" {% if config.audio_quality == '192kbps' %}selected{% endif %}>192 kbps</option>
                                <option value="256kbps" {% if config.audio_quality == '256kbps' %}selected{% endif %}>256 kbps</option>
                                <option value="320kbps" {% if config.audio_quality == '320kbps' %}selected{% endif %}>320 kbps</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">FFmpeg Path</label>
                        <input type="text" id="ffmpeg_path" value="{{ config.ffmpeg_path }}" class="w-full bg-[#2a2a2a] border border-gray-700 rounded-md px-4 py-2 focus:outline-none focus:border-[#7B2FBE]">
                    </div>
                </div>
            </section>

            <section class="bg-[#1a1a1a] p-8 rounded-lg border border-gray-800 shadow-2xl">
                <h3 class="text-xl font-bold mb-6 text-[#7B2FBE] flex items-center">
                    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                    Spotify Data Export
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Spotify Export Folder</label>
                        <div class="flex space-x-2">
                            <input type="text" id="spotify_export_folder" value="{{ config.spotify_export_folder }}" placeholder="/path/to/extracted/export" class="flex-1 bg-[#2a2a2a] border border-gray-700 rounded-md px-4 py-2 focus:outline-none focus:border-[#7B2FBE]">
                        </div>
                        <p class="mt-2 text-xs text-gray-500">Extract your Spotify data export zip and select the folder here. It should contain MyData/ or Playlist1.json files.</p>
                    </div>
                </div>
            </section>

            <div class="flex justify-end space-x-4">
                <button id="saveSettingsBtn" class="bg-[#7B2FBE] hover:bg-[#9B59B6] text-white font-bold py-3 px-10 rounded-full transition shadow-lg">Save Settings</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('saveSettingsBtn').addEventListener('click', () => {
            const data = {
                output_folder: document.getElementById('output_folder').value,
                audio_format: document.getElementById('audio_format').value,
                audio_quality: document.getElementById('audio_quality').value,
                ffmpeg_path: document.getElementById('ffmpeg_path').value,
                spotify_export_folder: document.getElementById('spotify_export_folder').value
            };

            fetch('/api/settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(res => {
                if (res.status === 'ok') {
                    alert('Settings saved successfully!');
                }
            });
        });
    </script>
</body>
</html>
