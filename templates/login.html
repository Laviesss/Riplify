<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riplify - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-[#0f0f0f] text-white flex items-center justify-center h-screen">
    <div class="text-center p-8 bg-[#1a1a1a] rounded-lg shadow-xl border border-[#7B2FBE]">
        <h1 class="text-5xl font-bold mb-6 text-[#7B2FBE]">Riplify</h1>

        <a href="{{ auth_url }}" class="bg-[#7B2FBE] hover:bg-[#9B59B6] text-white font-bold py-3 px-8 rounded-full transition duration-300 transform hover:scale-105 inline-block">

</html>
